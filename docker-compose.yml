services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grid}
      POSTGRES_USER: ${POSTGRES_USER:-grid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grid}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grid} -d ${POSTGRES_DB:-grid}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: .
    image: grid-control-plane:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONTROL_HOST: 0.0.0.0
      CONTROL_PORT: ${CONTROL_PORT:-19090}
      CONTROL_AUTH_TOKEN: ${CONTROL_AUTH_TOKEN:-replace-with-strong-token}
      CONTROL_STORAGE_BACKEND: ${CONTROL_STORAGE_BACKEND:-postgres}
      CONTROL_PG_DSN: ${CONTROL_PG_DSN:-postgres://grid:grid@postgres:5432/grid}
      CONTROL_PG_TABLE: ${CONTROL_PG_TABLE:-control_plane_state}
      CONTROL_QUEUE_BACKEND: ${CONTROL_QUEUE_BACKEND:-redis_bullmq}
      CONTROL_REDIS_URL: ${CONTROL_REDIS_URL:-redis://redis:6379}
      CONTROL_BULLMQ_QUEUE: ${CONTROL_BULLMQ_QUEUE:-grid-ledger-events}
      CONTROL_BULLMQ_WORKER_CONCURRENCY: ${CONTROL_BULLMQ_WORKER_CONCURRENCY:-8}
      PRESENCE_TTL_SECONDS: ${PRESENCE_TTL_SECONDS:-40}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      LEDGER_DECAY_ALPHA: ${LEDGER_DECAY_ALPHA:-0.9}
      MESSAGE_COOLDOWN_MS: ${MESSAGE_COOLDOWN_MS:-2000}
      SESSION_PATH_EMA_ALPHA: ${SESSION_PATH_EMA_ALPHA:-0.7}
    ports:
      - "${CONTROL_PORT:-19090}:19090"

volumes:
  postgres-data:
  redis-data:
